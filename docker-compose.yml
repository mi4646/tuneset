services:
  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6381:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  backend:
    image: tuneset-backend:0.5.8
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    depends_on:
      - redis
    volumes:
      - ./backend/data:/app/data
      - ./logs:/app/logs
      - ./VERSION:/app/VERSION:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  worker:
    image: tuneset-backend:0.5.8
    build:
      context: ./backend
    command: ["uv", "run", "celery", "-A", "app.tasks.celery_app", "worker", "-l", "info"]
    env_file:
      - ./.env
    depends_on:
      - redis
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  beat:
    image: tuneset-backend:0.5.8
    build:
      context: ./backend
    command: ["uv", "run", "celery", "-A", "app.tasks.celery_app", "beat", "-l", "info"]
    env_file:
      - ./.env
    depends_on:
      - redis
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  frontend:
    image: tuneset-frontend:0.5.8
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  redis-data:
