services:
  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  backend:
    build:
      context: ../backend
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    depends_on:
      - redis
    volumes:
      - ../backend/data:/app/data
    restart: unless-stopped

  worker:
    build:
      context: ../backend
    command: ["uv", "run", "celery", "-A", "app.tasks.celery_app", "worker", "-l", "info"]
    env_file:
      - ../backend/.env
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis-data:
